<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>现代五子棋 | Gomoku</title>
  <style>
    :root {
      --bg-start: #0a2e1a;
      --bg-end: #0f1710;
      --panel-bg: rgba(20, 30, 20, 0.85);
      --wood: #c49a6c;
      --wood-dark: #8b5a2b;
      --line: #3d2b1f;
      --black-piece: #1a1a1a;
      --white-piece: #f2f2f2;
      --accent: #4ade80;
      --text: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(145deg, var(--bg-start) 0%, #0a150d 40%, var(--bg-end) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 20px;
      max-width: 100%;
    }
    h1 { font-weight: 300; letter-spacing: 2px; font-size: 1.8rem; text-align: center; }
    .game-wrapper {
      position: relative;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.05);
    }
    canvas {
      display: block;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--wood) 0%, #b88656 100%);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3), 0 4px 15px rgba(0,0,0,0.4);
      cursor: pointer;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button.active { background: var(--accent); color: #052e16; border-color: transparent; font-weight: 600; }
    #status {
      text-align: center;
      font-size: 1.1rem;
      min-height: 28px;
      margin-top: 10px;
      color: var(--accent);
      font-weight: 500;
    }
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; justify-content: center; align-items: center; z-index: 100;
    }
    .modal.open { display: flex; }
    .modal-content {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      padding: 24px;
      border-radius: 16px;
      width: 90%; max-width: 400px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .close-btn { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }
    .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .rate-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 6px; overflow: hidden; }
    .rate-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
    .hint { font-size: 0.8rem; opacity: 0.7; margin-top: 10px; text-align: center; }
    @media (max-width: 650px) {
      canvas { width: 100% !important; height: auto !important; }
      .controls { flex-direction: column; width: 100%; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>五子棋 · 现代版</h1>
    <div class="game-wrapper">
      <canvas id="board" width="570" height="570"></canvas>
      <div id="status">黑方回合 (点击开始)</div>
      <div class="controls">
        <button id="mode-ai" class="active">🤖 挑战AI(困难)</button>
        <button id="mode-pvp">👥 本地双人</button>
        <button id="restart">🔄 重新开始</button>
        <button id="stats-btn">📊 战绩记录</button>
      </div>
      <div class="hint">提示：线上联机需配合 WebSocket 服务端部署，当前为本地/人机模式</div>
    </div>
  </div>

  <div class="modal" id="stats-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📊 历史战绩</h2>
        <button class="close-btn" id="close-stats">&times;</button>
      </div>
      <div id="stats-list"></div>
    </div>
  </div>

<script>
  // ================= 配置与常量 =================
  const SIZE = 15;
  const PADDING = 30;
  const CELL = 36;
  const CANVAS_SIZE = PADDING * 2 + CELL * (SIZE - 1);
  const WIN_LEN = 5;

  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.height = CANVAS_SIZE;

  // ================= 游戏状态 =================
  let board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0)); // 0:空, 1:黑, 2:白
  let currentPlayer = 1; // 1:黑先
  let gameOver = false;
  let mode = 'ai'; // 'ai' | 'pvp'
  let aiThinking = false;
  let lastMove = null;

  // ================= 战绩系统 =================
  const STORAGE_KEY = 'gomoku_stats_v1';
  const defaultStats = { 
    ai: { wins: 0, losses: 0, draws: 0 },
    pvp: { blackWins: 0, whiteWins: 0, draws: 0 }
  };
  let stats = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultStats;

  function saveStats() { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); }

  function updateStats(result) {
    if (mode === 'ai') {
      if (result === 1) stats.ai.losses++;
      else if (result === 2) stats.ai.wins++;
      else stats.ai.draws++;
    } else {
      if (result === 1) stats.pvp.blackWins++;
      else if (result === 2) stats.pvp.whiteWins++;
      else stats.pvp.draws++;
    }
    saveStats();
  }

  function showStats() {
    const list = document.getElementById('stats-list');
    const aiTotal = stats.ai.wins + stats.ai.losses + stats.ai.draws;
    const pvpTotal = stats.pvp.blackWins + stats.pvp.whiteWins + stats.pvp.draws;
    const aiRate = aiTotal ? Math.round((stats.ai.wins / aiTotal) * 100) : 0;
    
    list.innerHTML = `
      <div class="stat-row">
        <span>🤖 人机对战 (你的胜率)</span>
        <span>${aiRate}% (${stats.ai.wins}胜/${stats.ai.losses}负)</span>
      </div>
      <div class="rate-bar"><div class="rate-fill" style="width:${aiRate}%"></div></div>
      
      <div class="stat-row" style="margin-top:16px">
        <span>👥 本地双人</span>
        <span>黑${stats.pvp.blackWins} / 白${stats.pvp.whiteWins} / 平${stats.pvp.draws}</span>
      </div>
      <div style="display:flex; gap:8px; margin-top:6px">
        <div style="flex:1; height:6px; background:#1a1a1a; border-radius:3px; overflow:hidden">
          <div style="height:100%; width:${pvpTotal?Math.round(stats.pvp.blackWins/pvpTotal*100):0}%; background:#555"></div>
        </div>
        <div style="flex:1; height:6px; background:#f0f0f0; border-radius:3px; overflow:hidden">
          <div style="height:100%; width:${pvpTotal?Math.round(stats.pvp.whiteWins/pvpTotal*100):0}%; background:#333"></div>
        </div>
      </div>
      <button onclick="if(confirm('确定清空战绩吗？')){localStorage.removeItem('${STORAGE_KEY}');location.reload();}" style="margin-top:20px;width:100%;background:rgba(255,80,80,0.2);border-color:rgba(255,80,80,0.3)">🗑️ 清空数据</button>
    `;
    document.getElementById('stats-modal').classList.add('open');
  }

  // ================= 渲染引擎 =================
  function drawBoard() {
    ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    // 木纹底色 (通过渐变模拟)
    ctx.fillStyle = 'linear-gradient(135deg, #c49a6c 0%, #b88656 100%)';
    ctx.fillRect(0,0,CANVAS_SIZE,CANVAS_SIZE);

    ctx.strokeStyle = '#3d2b1f';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < SIZE; i++) {
      const pos = PADDING + i * CELL;
      ctx.moveTo(pos, PADDING); ctx.lineTo(pos, CANVAS_SIZE - PADDING);
      ctx.moveTo(PADDING, pos); ctx.lineTo(CANVAS_SIZE - PADDING, pos);
    }
    ctx.stroke();

    // 星位
    const stars = [3,7,11];
    ctx.fillStyle = '#2a1c10';
    for (let x of stars) for (let y of stars) {
      ctx.beginPath();
      ctx.arc(PADDING + x*CELL, PADDING + y*CELL, 3, 0, Math.PI*2);
      ctx.fill();
    }

    // 绘制棋子
    for (let x = 0; x < SIZE; x++) {
      for (let y = 0; y < SIZE; y++) {
        if (board[x][y]) drawPiece(x, y, board[x][y]);
      }
    }

    // 最后落子标记
    if (lastMove) {
      ctx.strokeStyle = 'rgba(255,50,50,0.8)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(PADDING + lastMove.x*CELL, PADDING + lastMove.y*CELL, 4, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  function drawPiece(x, y, player) {
    const cx = PADDING + x * CELL;
    const cy = PADDING + y * CELL;
    const r = CELL * 0.42;

    // 3D光泽渐变
    const grad = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, r*0.1, cx, cy, r);
    if (player === 1) { // 黑
      grad.addColorStop(0, '#555');
      grad.addColorStop(0.4, '#222');
      grad.addColorStop(1, '#0a0a0a');
    } else { // 白
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.5, '#e6e6e6');
      grad.addColorStop(1, '#b0b0b0');
    }

    // 阴影
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.6)';
    ctx.shadowBlur = 6;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 3;
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // 高光
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath();
    ctx.ellipse(cx - r*0.3, cy - r*0.35, r*0.25, r*0.12, Math.PI/4, 0, Math.PI*2);
    ctx.fill();
  }

  // ================= 核心逻辑 =================
  function getGrid(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_SIZE / rect.width;
    const scaleY = CANVAS_SIZE / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    const gx = Math.round((x - PADDING) / CELL);
    const gy = Math.round((y - PADDING) / CELL);
    return { x: gx, y: gy };
  }

  function checkWin(x, y, p) {
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (let [dx, dy] of dirs) {
      let cnt = 1;
      for (let i = 1; i < WIN_LEN; i++) {
        const nx = x + dx*i, ny = y + dy*i;
        if (nx>=0 && nx<SIZE && ny>=0 && ny<SIZE && board[nx][ny]===p) cnt++; else break;
      }
      for (let i = 1; i < WIN_LEN; i++) {
        const nx = x - dx*i, ny = y - dy*i;
        if (nx>=0 && nx<SIZE && ny>=0 && ny<SIZE && board[nx][ny]===p) cnt++; else break;
      }
      if (cnt >= WIN_LEN) return true;
    }
    return false;
  }

  function isFull() { return board.flat().every(c => c !== 0); }

  function endGame(winner) {
    gameOver = true;
    updateStats(winner);
    const msg = winner === 0 ? '平局！' : (winner === 1 ? '黑方获胜！' : '白方获胜！');
    document.getElementById('status').textContent = msg + ' (点击重新开始)';
    drawBoard();
  }

  function placePiece(x, y) {
    if (gameOver || board[x][y] || aiThinking) return;
    board[x][y] = currentPlayer;
    lastMove = { x, y };
    drawBoard();

    if (checkWin(x, y, currentPlayer)) {
      endGame(currentPlayer);
      return;
    }
    if (isFull()) { endGame(0); return; }

    currentPlayer = currentPlayer === 1 ? 2 : 1;
    document.getElementById('status').textContent = currentPlayer === 1 ? '黑方回合' : '白方回合';

    if (mode === 'ai' && currentPlayer === 2 && !gameOver) {
      aiThinking = true;
      document.getElementById('status').textContent = '🤖 AI思考中...';
      setTimeout(() => {
        const move = getBestMove();
        placePiece(move.x, move.y);
        aiThinking = false;
      }, 150);
    }
  }

  canvas.addEventListener('click', e => {
    const { x, y } = getGrid(e);
    if (x < 0 || x >= SIZE || y < 0 || y >= SIZE) return;
    placePiece(x, y);
  });

  // ================= 困难 AI =================
  function evaluateLine(count, openEnds) {
    if (count >= 5) return 1000000;
    if (count === 4) return openEnds === 2 ? 100000 : 10000;
    if (count === 3) return openEnds === 2 ? 10000 : 1000;
    if (count === 2) return openEnds === 2 ? 1000 : 100;
    return count === 1 && openEnds === 2 ? 10 : 1;
  }

  function getScore(x, y, player) {
    let total = 0;
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (let [dx, dy] of dirs) {
      let count = 1, open = 0;
      for (let dir of [1, -1]) {
        let nx = x + dx*dir, ny = y + dy*dir;
        let c = 0;
        while (nx>=0 && nx<SIZE && ny>=0 && ny<SIZE && board[nx][ny] === player) {
          c++; nx += dx*dir; ny += dy*dir;
        }
        count += c;
        if (nx>=0 && nx<SIZE && ny>=0 && ny<SIZE && board[nx][ny] === 0) open++;
      }
      total += evaluateLine(count, open);
    }
    return total;
  }

  function getBestMove() {
    let bestScore = -Infinity, bestMoves = [];
    for (let x = 0; x < SIZE; x++) {
      for (let y = 0; y < SIZE; y++) {
        if (board[x][y]) continue;
        // 启发式：只评估周围有子的点，提升性能
        let hasNeighbor = false;
        for (let dx=-1; dx<=1; dx++) for (let dy=-1; dy<=1; dy++) {
          if (dx===0 && dy===0) continue;
          const nx=x+dx, ny=y+dy;
          if (nx>=0 && nx<SIZE && ny>=0 && ny<SIZE && board[nx][ny]) hasNeighbor = true;
        }
        if (!hasNeighbor) continue;

        const atk = getScore(x, y, 2); // AI进攻分
        const def = getScore(x, y, 1); // 防守分
        const score = atk * 1.1 + def; // 略微偏向进攻
        if (score > bestScore) {
          bestScore = score;
          bestMoves = [{x, y}];
        } else if (score === bestScore) {
          bestMoves.push({x, y});
        }
      }
    }
    if (bestMoves.length === 0) return { x: 7, y: 7 }; // 默认中点
    return bestMoves[Math.floor(Math.random() * bestMoves.length)];
  }

  // ================= UI 控制 =================
  document.getElementById('mode-ai').onclick = function() {
    mode = 'ai'; this.classList.add('active'); document.getElementById('mode-pvp').classList.remove('active');
    resetGame();
  };
  document.getElementById('mode-pvp').onclick = function() {
    mode = 'pvp'; this.classList.add('active'); document.getElementById('mode-ai').classList.remove('active');
    resetGame();
  };
  document.getElementById('restart').onclick = resetGame;
  document.getElementById('stats-btn').onclick = showStats;
  document.getElementById('close-stats').onclick = () => document.getElementById('stats-modal').classList.remove('open');
  window.onclick = e => { if (e.target === document.getElementById('stats-modal')) e.target.classList.remove('open'); };

  function resetGame() {
    board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    currentPlayer = 1;
    gameOver = false;
    aiThinking = false;
    lastMove = null;
    drawBoard();
    document.getElementById('status').textContent = '黑方回合';
  }

  // 初始化
  resetGame();
  console.log('🟢 五子棋已加载。支持本地双人/AI对战。数据已持久化至 localStorage。');
</script>
</body>
</html>
